<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Attendance Admin — BYMO</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F4F6FA;color:#1a1a1a;font-size:14px;min-height:100vh}

    /* TOP BAR */
    .topbar{background:#185FA5;color:#fff;padding:0 28px;display:flex;align-items:center;justify-content:space-between;height:58px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.15)}
    .topbar-left{display:flex;align-items:center;gap:12px}
    .topbar-logo{width:32px;height:32px;background:rgba(255,255,255,.2);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px}
    .topbar-title{font-size:16px;font-weight:600}
    .topbar-date{font-size:12px;color:rgba(255,255,255,.7);margin-left:4px}
    .topbar-right{display:flex;align-items:center;gap:8px}
    .tbtn{padding:7px 14px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:none;display:inline-flex;align-items:center;gap:6px;transition:all .15s}
    .tbtn-white{background:rgba(255,255,255,.15);color:#fff}
    .tbtn-white:hover{background:rgba(255,255,255,.25)}
    .tbtn-solid{background:#fff;color:#185FA5}
    .tbtn-solid:hover{background:#e8f0fb}
    .tbtn:disabled{opacity:.5;cursor:default}
    .last-sync{font-size:11px;color:rgba(255,255,255,.6)}

    /* MAIN */
    .main{max-width:1200px;margin:0 auto;padding:24px 28px;display:flex;flex-direction:column;gap:20px}

    /* STAT GRID */
    .stat-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:14px}
    .stat-card{background:#fff;border-radius:12px;padding:18px 20px;border:1px solid #e8ecf2;position:relative;overflow:hidden}
    .stat-card::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:12px 12px 0 0}
    .stat-card.green::after{background:#1D9E75}
    .stat-card.amber::after{background:#BA7517}
    .stat-card.red::after{background:#E24B4A}
    .stat-card.blue::after{background:#185FA5}
    .stat-card.gray::after{background:#aaa}
    .stat-val{font-size:30px;font-weight:600;line-height:1;margin-top:4px}
    .stat-val.green{color:#1D9E75}.stat-val.amber{color:#BA7517}.stat-val.red{color:#E24B4A}.stat-val.blue{color:#185FA5}
    .stat-lbl{font-size:11px;color:#888;margin-top:6px;font-weight:500;text-transform:uppercase;letter-spacing:.04em}
    .stat-sub{font-size:11px;color:#aaa;margin-top:3px}

    /* PROGRESS BAR */
    .prog-bar{height:6px;background:#eee;border-radius:3px;overflow:hidden;margin-top:10px}
    .prog-fill{height:100%;border-radius:3px;transition:width .4s ease}

    /* PANEL */
    .panel{background:#fff;border-radius:12px;border:1px solid #e8ecf2;overflow:hidden}
    .panel-header{padding:14px 20px;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;justify-content:space-between;gap:12px}
    .panel-title{font-size:14px;font-weight:600;display:flex;align-items:center;gap:8px}
    .panel-actions{display:flex;gap:8px;align-items:center;flex-shrink:0}

    /* BUTTONS */
    .btn{padding:6px 12px;border-radius:7px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid #ddd;background:#fff;color:#333;display:inline-flex;align-items:center;gap:5px;transition:all .1s;white-space:nowrap}
    .btn:hover{background:#f5f5f5}
    .btn-blue{background:#185FA5;color:#fff;border-color:#185FA5}
    .btn-blue:hover{background:#0C447C}
    .btn-red{color:#E24B4A;border-color:#F7C1C1}
    .btn-red:hover{background:#FCEBEB}
    .btn:disabled{opacity:.4;cursor:default;pointer-events:none}

    /* TABLE */
    .tbl-wrap{overflow-x:auto}
    table{width:100%;border-collapse:collapse;font-size:13px}
    th{font-size:11px;font-weight:600;color:#888;text-align:left;padding:9px 16px;border-bottom:1px solid #f0f0f0;white-space:nowrap;text-transform:uppercase;letter-spacing:.04em;background:#fafafa}
    td{padding:10px 16px;border-bottom:1px solid #f5f5f5;vertical-align:middle}
    tr:last-child td{border-bottom:none}
    tbody tr:hover td{background:#f9fbff}

    /* BADGES */
    .badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
    .badge-green{background:#EAF3DE;color:#2D6011}
    .badge-amber{background:#FAEEDA;color:#7A4500}
    .badge-red{background:#FCEBEB;color:#9B1C1C}
    .badge-gray{background:#f0f0f0;color:#666}
    .badge-blue{background:#E6F1FB;color:#0C447C}
    .dot{width:6px;height:6px;border-radius:50%;display:inline-block}
    .dot-green{background:#1D9E75}.dot-amber{background:#BA7517}.dot-red{background:#E24B4A}.dot-gray{background:#aaa}

    /* CACHE BAR */
    .cache-bar{display:flex;align-items:center;gap:12px;padding:12px 20px;font-size:13px;flex-wrap:wrap}
    .cache-indicator{display:flex;align-items:center;gap:8px;font-weight:500}

    /* LOG */
    .log-row{display:flex;align-items:flex-start;gap:12px;padding:11px 16px;border-bottom:1px solid #f5f5f5;font-size:13px}
    .log-row:last-child{border-bottom:none}
    .log-time{font-size:11px;color:#aaa;white-space:nowrap;padding-top:2px;min-width:68px}
    .log-body{flex:1;min-width:0}
    .log-class{font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .log-detail{font-size:12px;color:#888;margin-top:2px}

    /* BLOCK TIMELINE */
    .block-grid{display:grid;gap:1px;background:#f0f0f0}
    .block-row{background:#fff;display:grid;grid-template-columns:100px 1fr;align-items:stretch}
    .block-label{padding:12px 16px;font-size:12px;font-weight:600;color:#555;border-right:1px solid #f0f0f0;display:flex;flex-direction:column;justify-content:center}
    .block-time{font-size:10px;color:#aaa;font-weight:400;margin-top:2px}
    .block-classes{display:flex;flex-wrap:wrap;gap:6px;padding:10px 14px;align-items:center}
    .class-chip{padding:5px 10px;border-radius:8px;font-size:12px;background:#E6F1FB;color:#0C447C;border:1px solid #C5DCF5;cursor:default}
    .class-chip.submitted{background:#EAF3DE;color:#2D6011;border-color:#B5D98A}
    .class-chip.pending{background:#FAEEDA;color:#7A4500;border-color:#F5C97A}

    /* QUEUE */
    .queue-row{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid #f5f5f5;font-size:13px}
    .queue-row:last-child{border-bottom:none}

    /* EMPTY */
    .empty{padding:36px;text-align:center;color:#aaa;font-size:13px}

    /* LOADING */
    .loading{display:flex;align-items:center;justify-content:center;padding:60px;color:#aaa;gap:10px;font-size:14px}
    .spinner{width:22px;height:22px;border:2px solid #eee;border-top-color:#185FA5;border-radius:50%;animation:spin .6s linear infinite;flex-shrink:0}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* SECTION TABS */
    .tabs{display:flex;border-bottom:2px solid #f0f0f0;padding:0 20px;gap:4px}
    .tab{padding:10px 18px;font-size:13px;font-weight:500;color:#888;cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s;font-family:inherit;border-radius:6px 6px 0 0}
    .tab:hover{color:#185FA5;background:#f4f7fc}
    .tab.active{color:#185FA5;border-bottom-color:#185FA5;background:#EBF3FB}

    /* RATE LIMIT */
    .rate-bar{display:flex;align-items:center;gap:8px;font-size:12px;color:#888}
    .rate-fill{height:4px;border-radius:2px;background:#1D9E75;transition:width .3s}
    .rate-track{flex:1;height:4px;background:#eee;border-radius:2px;overflow:hidden}

    @media(max-width:900px){
      .stat-grid{grid-template-columns:repeat(2,1fr)}
      .main{padding:16px}
    }
  </style>
</head>

<script>
var dashData  = null;
var activeTab = 'classes';
var _sortCol  = 'startTime';
var _sortDir  = 1;

var GAS_URL = 'https://script.google.com/macros/s/AKfycbzCovXcc1wPLjGeqhp4GDWdB_WuOYD5P9Z5JGgKtP8Rmq3PwuWvcqHIV0g9m5mMniOvDg/exec';
var _jc = 0;
function gasGet(action, params) {
  var url = GAS_URL + '?action=' + encodeURIComponent(action);
  if (params) Object.keys(params).forEach(function(k){ url += '&'+encodeURIComponent(k)+'='+encodeURIComponent(params[k]); });
  return new Promise(function(resolve, reject) {
    var cb = '__ac'+(++_jc), s = document.createElement('scr'+'ipt');
    var t = setTimeout(function(){ cleanup(); reject(new Error('Timeout')); }, 30000);
    function cleanup(){ clearTimeout(t); delete window[cb]; if(s.parentNode) s.parentNode.removeChild(s); }
    window[cb] = function(d){ cleanup(); resolve(d); };
    s.onerror  = function(){ cleanup(); reject(new Error('Network error')); };
    s.src = url + '&callback=' + cb;
    document.head.appendChild(s);
  });
}

function toMins(t) {
  if (!t) return 9999;
  var m = t.match(/(\d+):(\d+)\s*(AM|PM)/i);
  if (!m) return 9999;
  var h=parseInt(m[1]),mn=parseInt(m[2]),pm=m[3].toUpperCase()==='PM';
  if(pm&&h!==12)h+=12; if(!pm&&h===12)h=0;
  return h*60+mn;
}

function fmt(d){ return d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}); }
function fmtTs(ts){ if(!ts)return '--'; var d=new Date(ts); return d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}); }

function refreshAll() {
  var btn = document.getElementById('refresh-btn');
  btn.disabled = true;
  btn.innerHTML = 'Loading...';
  gasGet('getAdminDashboardData')
    .then(function(data) {
      btn.disabled = false;
      btn.innerHTML = 'Refresh';
      document.getElementById('last-sync').textContent = 'Updated ' + fmt(new Date());
      if (!data.success) {
        document.getElementById('main').innerHTML = '<div style="padding:40px;color:#E24B4A;text-align:center">Error: ' + (data.error||'unknown') + '</div>';
        return;
      }
      dashData = data;
      render(data);
    })
    .catch(function(err) {
      btn.disabled = false;
      btn.innerHTML = 'Refresh';
      document.getElementById('main').innerHTML = '<div style="padding:40px;color:#E24B4A;text-align:center">Failed: ' + err.message + '</div>';
    });
}

function gradeNum(name) {
  if (!name) return 99;
  var m = name.match(/\((\d{1,2})\)/);
  return m ? parseInt(m[1]) : 99;
}

function render(d) {
  var now = new Date();
  document.getElementById('topbar-date').textContent =
    now.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});

  var total = d.allClasses ? d.allClasses.length : 0;
  var sub   = d.submittedCount || 0;
  var pct   = total > 0 ? Math.round(sub/total*100) : 0;
  var pend  = d.pendingCount  || 0;
  var queue = d.queuedCount   || 0;
  var errs  = (d.recentErrors||[]).length;

  document.getElementById('main').innerHTML =
    '<div class="stat-grid">' +
      scard(sub+' / '+total, 'Submitted',  pct===100?'green':pct>50?'amber':'red',
        '<div class="prog-bar"><div class="prog-fill" style="width:'+pct+'%;background:'+(pct===100?'#1D9E75':pct>50?'#BA7517':'#E24B4A')+'"></div></div>') +
      scard(pct+'%',  'Completion', pct===100?'green':pct>50?'amber':'red', "Today's attendance") +
      scard(pend,     'Pending',    pend>0?'amber':'green',  pend>0?'Classes not yet submitted':'All up to date') +
      scard(queue,    'Queued',     queue>0?'red':'green',   queue>0?'Will retry automatically':'No failures') +
      scard(errs,     'API errors', errs>0?'red':'green',    'Recent period') +
    '</div>' +
    '<div class="panel">' +
      '<div class="cache-bar">' +
        '<div class="cache-indicator">' +
          '<span class="dot '+(d.cacheHealthy?'dot-green':'dot-red')+'"></span>' +
          '<span>'+(d.cacheHealthy?'Schedule cache is current':'Cache is stale - refresh needed')+'</span>' +
        '</div>' +
        '<span style="color:#aaa">|</span>' +
        '<span style="color:#888">Last refresh: '+fmtTs(d.lastRefresh)+'</span>' +
        '<span style="color:#aaa">|</span>' +
        '<span style="color:#888">Cache date: '+(d.cacheDate||'--')+'</span>' +
      '</div>' +
    '</div>' +
    '<div class="panel" id="main-panel">' +
      '<div class="tabs">' +
        '<button class="tab '+(activeTab==='classes'?'active':'')+'" onclick="switchTab(\'classes\')">By Block / Period</button>' +
        '<button class="tab '+(activeTab==='table'  ?'active':'')+'" onclick="switchTab(\'table\')">Table view</button>' +
        '<button class="tab '+(activeTab==='log'    ?'active':'')+'" onclick="switchTab(\'log\')">Log</button>' +
        '<button class="tab '+(activeTab==='errors' ?'active':'')+'" onclick="switchTab(\'errors\')">Errors</button>' +
      '</div>' +
      '<div id="tab-content">' + renderTab(d) + '</div>' +
    '</div>';
}

function scard(val, label, color, sub) {
  var colors = { green:'#E1F5EE', amber:'#FFF3E0', red:'#FCEBEB' };
  var tc     = { green:'#1D9E75', amber:'#BA7517', red:'#E24B4A' };
  return '<div class="stat-card" style="border-top:3px solid '+(tc[color]||'#ddd')+'">' +
    '<div class="stat-val" style="color:'+(tc[color]||'#333')+'">'+val+'</div>' +
    '<div class="stat-label">'+label+'</div>' +
    '<div class="stat-sub">'+sub+'</div>' +
  '</div>';
}

function gradeNum(name) {
  if (!name) return 99;
  var m = name.match(/\((\d{1,2})\)/);
  return m ? parseInt(m[1]) : 99;
}

function classSort(a, b) {
  var ga = gradeNum(a.className||''), gb = gradeNum(b.className||'');
  if (ga !== gb) return ga - gb;
  return (a.className||'').localeCompare(b.className||'');
}

function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });
  var map = {classes:0, table:1, log:2, errors:3, queue:4};
  var tabs = document.querySelectorAll('.tab');
  if (tabs[map[tab]]) tabs[map[tab]].classList.add('active');
  if (dashData) document.getElementById('tab-content').innerHTML = renderTab(dashData);
}

function renderTab(d) {
  if (activeTab==='classes') return renderBlockView(d);
  if (activeTab==='table')   return renderTableView(d);
  if (activeTab==='queue')   return renderQueueView(d);
  if (activeTab==='log')     return renderLogView(d);
  if (activeTab==='errors')  return renderErrorView(d);
  return '';
}

function renderQueueView(d) {
  var queue = d.queuedItems || [];
  var html = '<div class="panel-header" style="border-top:none">' +
    '<span class="panel-title">Queued submissions'+(queue.length?' ('+queue.length+')':'')+'</span>' +
    '<div class="panel-actions">' +
      (queue.length ? '<button class="btn btn-blue" onclick="retryQueue()">Retry all</button>' : '') +
      (queue.length ? '<button class="btn btn-red" onclick="clearQueue()">Clear queue</button>' : '') +
    '</div></div>';
  if (!queue.length) return html + '<div class="empty">No queued submissions</div>';
  html += '<div class="tbl-wrap"><table><thead><tr><th>Class</th><th>Teacher</th><th>Period</th><th>Students</th><th>Queued At</th></tr></thead><tbody>';
  queue.forEach(function(q) {
    html += '<tr>' +
      '<td style="font-weight:500">'+(q.className||'--')+'</td>' +
      '<td style="color:#555">'+(q.teacherName||'--')+'</td>' +
      '<td><span class="badge badge-blue">'+(q.period||'--')+'</span></td>' +
      '<td>'+(q.studentCount||'--')+'</td>' +
      '<td style="color:#aaa;font-size:12px">'+(q.timestamp?fmtTs(q.timestamp):'--')+'</td>' +
    '</tr>';
  });
  html += '</tbody></table></div>';
  return html;
}

function renderBlockView(d) {
  var classes = d.allClasses || [];
  if (!classes.length) return '<div class="empty">No classes loaded - run a cache refresh</div>';
  var blockMap = {};
  classes.forEach(function(c) {
    var bk = c.period || 'No Period';
    if (!blockMap[bk]) blockMap[bk] = { startTime: c.startTime, endTime: c.endTime, classes: [] };
    blockMap[bk].classes.push(c);
  });
  var blocks = Object.keys(blockMap).sort(function(a,b) {
    var ta = toMins(blockMap[a].startTime), tb = toMins(blockMap[b].startTime);
    return ta !== tb ? ta-tb : a.localeCompare(b);
  });
  var html = '<div class="block-grid">';
  blocks.forEach(function(bk) {
    var bd = blockMap[bk];
    var subCnt  = bd.classes.filter(function(c){return c.submitted;}).length;
    var allSub  = subCnt === bd.classes.length;
    var noneSub = subCnt === 0;
    html += '<div class="block-row">' +
      '<div class="block-label">' +
        '<span style="color:#185FA5">'+bk+'</span>' +
        '<span class="block-time">'+(bd.startTime?bd.startTime+'-'+bd.endTime:'')+'</span>' +
        '<span style="font-size:10px;color:'+(allSub?'#1D9E75':noneSub?'#aaa':'#BA7517')+';margin-top:4px">'+subCnt+'/'+bd.classes.length+' submitted</span>' +
      '</div>' +
      '<div class="block-classes">';
    // Sort by grade then alpha
    bd.classes.slice().sort(classSort).forEach(function(c) {
      var tip = (c.teacherName||'') + ' - ' + (c.roomName||'');
      html += '<div class="class-chip '+(c.submitted?'submitted':'pending')+'" title="'+tip+'">' +
        (c.className||'Class') +
        (c.roomName ? ' <span style="opacity:.6;font-size:10px">'+c.roomName+'</span>' : '') +
        '</div>';
    });
    html += '</div></div>';
  });
  var sub = classes.filter(function(c){return c.submitted;}).length;
  html += '</div><div style="padding:12px 16px;border-top:1px solid #f0f0f0;font-size:12px;color:#888;display:flex;gap:16px">' +
    '<span>Submitted: '+sub+'</span><span>Pending: '+(classes.length-sub)+'</span><span>Total: '+classes.length+'</span></div>';
  return html;
}

function sortTable(col) {
  if (_sortCol===col) { _sortDir*=-1; } else { _sortCol=col; _sortDir=1; }
  if (dashData) document.getElementById('tab-content').innerHTML = renderTab(dashData);
}

function renderTableView(d) {
  var classes = (d.allClasses||[]).slice();
  if (!classes.length) return '<div class="empty">No classes loaded</div>';
  classes.sort(function(a,b) {
    if (_sortCol==='submitted') return ((a.submitted?1:0)-(b.submitted?1:0))*_sortDir;
    if (_sortCol==='teacherName'||_sortCol==='roomName') {
      var av=(a[_sortCol]||'').toLowerCase(), bv=(b[_sortCol]||'').toLowerCase();
      return (av<bv?-1:av>bv?1:0)*_sortDir;
    }
    // period/time/default: period → grade → alpha
    var pt = (toMins(a.startTime)-toMins(b.startTime))*_sortDir;
    if (pt !== 0) return pt;
    var pg = (gradeNum(a.className||'')-gradeNum(b.className||''))*_sortDir;
    if (pg !== 0) return pg;
    return (a.className||'').localeCompare(b.className||'')*_sortDir;
  });
  function th(label, col) {
    var arrow = _sortCol===col ? (_sortDir===1?'[^]':'[v]') : '[.]';
    return '<th style="cursor:pointer;user-select:none" onclick="sortTable(\''+col+'\')">'+label+' <span style="font-size:9px;color:#aaa">'+arrow+'</span></th>';
  }
  var html = '<div class="panel-header" style="border-top:none">' +
    '<span class="panel-title">'+classes.length+' classes today</span>' +
    '<div class="panel-actions"><input type="text" placeholder="Filter..." oninput="filterTable(this.value)" style="padding:5px 10px;border:1px solid #ddd;border-radius:7px;font-size:12px;width:160px"></div>' +
  '</div><div class="tbl-wrap"><table><thead><tr>' +
    th('Period','period')+th('Class','className')+th('Teacher','teacherName')+
    th('Room','roomName')+th('Time','startTime')+th('Status','submitted')+'<th>Submitted At</th>' +
  '</tr></thead><tbody id="class-tbody">';
  classes.forEach(function(c) {
    var badge = c.submitted
      ? (c.errorCount>0?'<span class="badge badge-amber">Partial</span>':'<span class="badge badge-green">Done</span>')
      : '<span class="badge badge-gray">Pending</span>';
    html += '<tr>' +
      '<td><span class="badge badge-blue">'+(c.period||'--')+'</span></td>' +
      '<td style="font-weight:500;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+(c.className||'--')+'</td>' +
      '<td style="color:#555">'+(c.teacherName||'--')+'</td>' +
      '<td>'+(c.roomName||'--')+'</td>' +
      '<td style="color:#888;white-space:nowrap">'+(c.startTime&&c.endTime?c.startTime+'-'+c.endTime:'--')+'</td>' +
      '<td>'+badge+'</td>' +
      '<td style="color:#aaa;font-size:12px">'+(c.submittedAt?fmtTs(c.submittedAt):'--')+'</td>' +
    '</tr>';
  });
  html += '</tbody></table></div>';
  return html;
}

function filterTable(q) {
  var rows = document.querySelectorAll('#class-tbody tr');
  q = q.toLowerCase();
  rows.forEach(function(r){ r.style.display = r.textContent.toLowerCase().includes(q)?'':'none'; });
}

function renderLogView(d) {
  var log = d.recentLog || [];
  var html = '<div class="panel-header" style="border-top:none">' +
    '<span class="panel-title">Submission log</span>' +
    '<button class="btn btn-red" onclick="clearLog()">Clear log</button></div>';
  if (!log.length) return html+'<div class="empty">No submissions yet today</div>';
  html += '<div class="tbl-wrap"><table><thead><tr><th>Time</th><th>Class</th><th>Teacher</th><th>Room</th><th>Period</th><th>Students</th><th>Errors</th></tr></thead><tbody>';
  log.forEach(function(e) {
    html += '<tr>' +
      '<td style="color:#888;white-space:nowrap">'+fmtTs(e.timestamp)+'</td>' +
      '<td style="font-weight:500">'+(e.className||'--')+'</td>' +
      '<td style="color:#555">'+(e.teacherName||'--')+'</td>' +
      '<td>'+(e.roomName||'--')+'</td>' +
      '<td><span class="badge badge-blue">'+(e.period||'--')+'</span></td>' +
      '<td>'+(e.submitted||0)+'</td>' +
      '<td style="color:'+(e.errorCount>0?'#E24B4A':'#aaa')+'">'+(e.errorCount||0)+'</td>' +
    '</tr>';
  });
  html += '</tbody></table></div>';
  return html;
}

function renderErrorView(d) {
  var errors = d.recentErrors || [];
  var html = '<div class="panel-header" style="border-top:none">' +
    '<span class="panel-title">API errors</span>' +
    '<button class="btn btn-red" onclick="clearErrors()">Clear</button></div>';
  if (!errors.length) return html+'<div class="empty">No recent errors</div>';
  html += '<div class="tbl-wrap"><table><thead><tr><th>Time</th><th>Context</th><th>Code</th><th>Message</th></tr></thead><tbody>';
  errors.forEach(function(e) {
    html += '<tr>' +
      '<td style="color:#888">'+fmtTs(e.timestamp)+'</td>' +
      '<td>'+(e.context||'--')+'</td>' +
      '<td><span class="badge badge-red">'+(e.code||'--')+'</span></td>' +
      '<td style="color:#555;font-size:12px">'+(e.message||'--')+'</td>' +
    '</tr>';
  });
  html += '</tbody></table></div>';
  return html;
}

function triggerCacheRefresh() {
  var btn = document.getElementById('cache-btn');
  btn.disabled = true; btn.textContent = 'Refreshing...';
  gasGet('manualRefresh')
    .then(function(r) {
      btn.disabled=false; btn.textContent='Refresh schedule cache';
      if(r.success){alert('Cache refreshed!\nClasses today: '+(r.classesToday||'?')+'\nRooms: '+(r.rooms||'?'));refreshAll();}
      else{alert('Failed: '+(r.error||'unknown'));}
    })
    .catch(function(e){btn.disabled=false;btn.textContent='Refresh schedule cache';alert('Error: '+e.message);});
}

function retryQueue() {
  gasGet('adminRetryQueue').then(function(r){alert('Retried: '+r.retried+'\nRemaining: '+r.remaining);refreshAll();}).catch(function(e){alert('Error: '+e.message);});
}
function clearQueue()  { if(!confirm('Clear all queued submissions?'))return; gasGet('adminClearQueue').then(function(){refreshAll();}); }
function clearLog()    { if(!confirm('Clear submission log?'))return; gasGet('adminClearLog').then(function(){refreshAll();}); }
function clearErrors() { gasGet('adminClearErrors').then(function(){refreshAll();}); }

refreshAll();
setInterval(refreshAll, 2*60*1000);
</script>
</body>
</html>
