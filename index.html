  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="BYMO Attendance">
  <meta name="theme-color" content="#185FA5">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#fff;color:#1a1a1a;-webkit-tap-highlight-color:transparent}
    #app{height:100vh;position:relative;overflow:hidden}

    /* Base screen - hidden */
    .screen{display:none;position:absolute;top:0;left:0;right:0;bottom:0;background:#fff}

    /* HOME */
    #s-home{flex-direction:column;align-items:center;justify-content:center;gap:32px}
    #s-home.active{display:flex}
    .school-name{font-size:13px;color:#888;letter-spacing:.08em;text-transform:uppercase}
    .scan-btn{width:200px;height:200px;border-radius:50%;background:#185FA5;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px}
    .scan-btn:active{background:#0C447C}
    .scan-btn-label{font-size:18px;font-weight:600;color:#fff}
    .scan-btn-sub{font-size:12px;color:#B5D4F4}
    .manual-btn{background:none;border:none;color:#aaa;font-size:13px;cursor:pointer;padding:8px}
    .clock{font-size:13px;color:#aaa}

    /* SCANNING */
    #s-scanning{flex-direction:column;align-items:center;justify-content:center;gap:20px;background:#000}
    #s-scanning.active{display:flex}
    .scanner-wrap{position:relative;width:280px;height:280px;border-radius:16px;overflow:hidden;background:#111}
    #qr-video{width:100%;height:100%;object-fit:cover}
    .scan-corners{position:absolute;inset:0;pointer-events:none}
    .sc{position:absolute;width:36px;height:36px;border-color:#fff;border-style:solid}
    .sc.tl{top:10px;left:10px;border-width:3px 0 0 3px;border-radius:3px 0 0 0}
    .sc.tr{top:10px;right:10px;border-width:3px 3px 0 0;border-radius:0 3px 0 0}
    .sc.bl{bottom:10px;left:10px;border-width:0 0 3px 3px;border-radius:0 0 0 3px}
    .sc.br{bottom:10px;right:10px;border-width:0 3px 3px 0;border-radius:0 0 3px 0}
    .scan-line{position:absolute;left:10px;right:10px;height:2px;background:#185FA5;animation:scanmove 2s ease-in-out infinite}
    @keyframes scanmove{0%,100%{top:18px}50%{top:250px}}
    .scan-hint{color:#aaa;font-size:14px}
    .scan-btns{display:flex;gap:12px}
    .scan-cancel{color:#ccc;background:none;border:1px solid #555;padding:10px 22px;border-radius:10px;font-size:14px;cursor:pointer}
    .scan-flip{color:#185FA5;background:none;border:1px solid #185FA5;padding:10px 16px;border-radius:10px;font-size:13px;cursor:pointer}

    /* DETECTING */
    #s-detecting{flex-direction:column;align-items:center;justify-content:center;gap:16px}
    #s-detecting.active{display:flex}
    .spinner{width:40px;height:40px;border:3px solid #eee;border-top-color:#185FA5;border-radius:50%;animation:spin .7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .det-room{font-size:20px;font-weight:500}
    .det-sub{font-size:14px;color:#888}

    /* ATTENDANCE - 3 row grid: header | scroll | footer */
    #s-attendance{display:none}
    #s-attendance.active{
      display:grid;
      grid-template-rows:auto 1fr auto;
      height:100vh;
      overflow:hidden;
      position:absolute;top:0;left:0;right:0;bottom:0;
    }
    #att-head{overflow:hidden;border-bottom:1px solid #eee;background:#fff}
    .att-header{padding:14px 18px 10px}
    .att-class{font-size:17px;font-weight:600}
    .att-meta{font-size:12px;color:#888;margin-top:2px}
    .att-pills{display:flex;gap:5px;margin-top:7px;flex-wrap:wrap;align-items:center}
    .pill{padding:3px 9px;border-radius:20px;font-size:11px;font-weight:500}
    .pill-blue{background:#E6F1FB;color:#0C447C}
    .pill-gray{background:#f2f2f0;color:#555}
    .not-your-class{background:none;border:none;font-size:11px;color:#185FA5;cursor:pointer;padding:0;margin-left:auto}
    .tally-bar{display:flex;border-top:1px solid #eee}
    .tally-item{flex:1;padding:9px 0;text-align:center;border-right:1px solid #eee}
    .tally-item:last-child{border-right:none}
    .tally-val{font-size:18px;font-weight:600}
    .tally-lbl{font-size:10px;color:#888;margin-top:1px}
    .tv-g{color:#1D9E75}.tv-r{color:#E24B4A}.tv-a{color:#BA7517}
    .error-banner{background:#FCEBEB;color:#A32D2D;padding:7px 16px;font-size:12px;display:none}
    .error-banner.show{display:block}
    /* Middle row - only this scrolls */
    #student-list{overflow-y:auto;-webkit-overflow-scrolling:touch;background:#fff}
    .student-row{display:flex;align-items:center;padding:9px 14px;border-bottom:1px solid #f0f0f0;gap:10px;flex-wrap:wrap}
    .avatar{width:34px;height:34px;border-radius:50%;background:#E6F1FB;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#185FA5;flex-shrink:0}
    .student-name{font-size:14px;font-weight:500;flex:1}
    .status-btns{display:flex;gap:3px;flex-shrink:0}
    .sbtn{padding:6px 11px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;border:2px solid #ddd;background:#f5f5f5;color:#bbb}
    .sbtn:active{opacity:.7}
    .sbtn-present.on{background:#C0DD97;color:#27500A;border-color:#639922}
    .sbtn-tardy.on{background:#FAC775;color:#633806;border-color:#BA7517}
    .sbtn-absent.on{background:#F7C1C1;color:#791F1F;border-color:#E24B4A}
    /* Office-marked students are greyed out and locked */
    .student-row.office-marked{background:#f9f9f9;opacity:.6}
    .student-row.office-marked .sbtn{pointer-events:none;cursor:default}
    .office-badge{font-size:10px;background:#eee;color:#888;padding:2px 7px;border-radius:10px;white-space:nowrap}
    /* Pencil note */
    .pencil-btn{background:none;border:none;cursor:pointer;font-size:16px;color:#ccc;padding:2px 4px;flex-shrink:0;line-height:1}
    .pencil-btn.has-note{color:#185FA5}
    .note-row{width:100%;padding:4px 14px 8px;display:none}
    .note-row.open{display:flex;justify-content:center}
    .note-input{width:100%;max-width:340px;border:1px solid #ddd;border-radius:8px;padding:8px 12px;font-size:13px;font-family:inherit;text-align:left}
    .note-input:focus{outline:none;border-color:#185FA5}
    .note-input:disabled{background:#f5f5f5;color:#aaa;cursor:default}
    /* Bottom row - always visible */
    #att-foot{display:flex;align-items:center;gap:10px;padding:10px 14px;border-top:2px solid #eee;background:#fff}
    .submit-btn{flex:1;padding:15px;border-radius:12px;background:#185FA5;color:#fff;border:none;font-size:15px;font-weight:700;cursor:pointer}
    .submit-btn:active{background:#0C447C}
    .submit-btn:disabled{background:#b0c4de}
    .prog-lbl{font-size:12px;color:#888;white-space:nowrap;flex-shrink:0}

    /* FALLBACK */
    #s-fallback{flex-direction:column}
    #s-fallback.active{display:flex}
    .fb-header{padding:14px 18px;border-bottom:1px solid #eee;display:flex;align-items:center;gap:14px;flex-shrink:0}
    .fb-back{background:none;border:none;font-size:24px;color:#888;cursor:pointer;padding:0;line-height:1}
    .fb-title{font-size:17px;font-weight:600}
    .seg-wrap{padding:12px 18px 0;flex-shrink:0}
    .seg{display:grid;grid-template-columns:1fr 1fr 1fr;border:2px solid #185FA5;border-radius:10px;overflow:hidden}
    .seg-btn{padding:10px 0;font-size:13px;font-weight:600;text-align:center;cursor:pointer;border:none}
    .seg-btn:not(:last-child){border-right:2px solid #185FA5}
    .seg-btn.on{background:#185FA5;color:#fff}
    .seg-btn.off{background:#fff;color:#185FA5}
    .fb-list{overflow-y:auto;flex:1;-webkit-overflow-scrolling:touch;padding:4px 0}
    .fb-item{display:flex;align-items:center;padding:12px 18px;gap:12px;cursor:pointer;border-bottom:1px solid #f0f0f0}
    .fb-item:active{background:#f9f9f9}
    .fb-icon{width:38px;height:38px;border-radius:50%;background:#E6F1FB;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:#185FA5;flex-shrink:0}
    .fb-icon.room{background:#f2f2f0;color:#666;border-radius:8px;font-size:10px}
    .fb-icon.period{background:#FFF3E0;color:#E65100;border-radius:8px;font-size:10px}
    .fb-main{flex:1;min-width:0}
    .fb-name{font-size:15px;font-weight:500}
    .fb-detail{font-size:11px;color:#888;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .fb-arrow{color:#ccc;font-size:18px}
    .fb-back-row{padding:10px 18px;display:flex;align-items:center;gap:10px;border-bottom:1px solid #eee;background:#f9f9f9;flex-shrink:0}

    /* SUCCESS */
    #s-success{flex-direction:column;align-items:center;justify-content:center;gap:20px}
    #s-success.active{display:flex}
    .success-icon{width:80px;height:80px;border-radius:50%;background:#E1F5EE;display:flex;align-items:center;justify-content:center}
    .success-title{font-size:22px;font-weight:600}
    .success-sub{font-size:14px;color:#888;text-align:center;max-width:280px;line-height:1.6}
    .done-btn{padding:14px 44px;border-radius:12px;background:#185FA5;color:#fff;border:none;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}

    /* TOAST */
    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#222;color:#fff;padding:10px 20px;border-radius:10px;font-size:13px;opacity:0;transition:opacity .25s;pointer-events:none;z-index:999;max-width:90vw;text-align:center}
    .toast.show{opacity:1}
  </style>
</head>

        <div class="tally-item"><div class="tally-val tv-r" id="t-absent">0</div><div class="tally-lbl">Absent</div></div>
      </div>
    </div>
    <div id="student-list"></div>
    <div id="att-foot">
      <span class="prog-lbl" id="prog-lbl"></span>
      <button class="submit-btn" id="submit-btn" onclick="submitAttendance()">Submit attendance</button>
    </div>
  </div>

  <div id="s-fallback" class="screen">
    <div class="fb-header">
      <button class="fb-back" onclick="go('s-home')">←</button>
      <div class="fb-title">Select a class</div>
    </div>
    <div class="seg-wrap">
      <div class="seg">
        <button class="seg-btn on"  id="seg-teacher" onclick="switchTab('teacher')">Teacher</button>
        <button class="seg-btn off" id="seg-room"    onclick="switchTab('room')">Room</button>
        <button class="seg-btn off" id="seg-block"   onclick="switchTab('block')">Period</button>
      </div>
    </div>
    <div class="fb-list" id="fb-list"></div>
  </div>

  <div id="s-success" class="screen">
    <div class="success-icon">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#1D9E75" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <div class="success-title">Submitted!</div>
    <div class="success-sub" id="success-sub"></div>
    <button class="done-btn" onclick="go('s-home')">Done</button>
  </div>

</div><!-- end app -->
<div class="toast" id="toast"></div>

<script src="https://unpkg.com/jsqr@1.4.0/dist/jsQR.js"></script>
<script>
var GAS_URL     = 'https://script.google.com/macros/s/AKfycbzCovXcc1wPLjGeqhp4GDWdB_WuOYD5P9Z5JGgKtP8Rmq3PwuWvcqHIV0g9m5mMniOvDg/exec';
var attState    = {};
var currentClass= null;
var scheduleData= null;
var fallbackTab = 'teacher';
var videoStream = null;
var scanInterval= null;
var facingMode  = 'environment';

// ── API ───────────────────────────────────────────────────────
var _jc = 0;
function gasGet(action, params) {
  var url = GAS_URL + '?action=' + encodeURIComponent(action);
  if (params) Object.keys(params).forEach(function(k){
    url += '&' + encodeURIComponent(k) + '=' + encodeURIComponent(params[k]);
  });
  return new Promise(function(res, rej) {
    var cb = '__gc' + (++_jc);
    var s  = document.createElement('scr'+'ipt');
    var t  = setTimeout(function(){ cleanup(); rej(new Error('Timeout')); }, 30000);
    function cleanup(){ clearTimeout(t); delete window[cb]; s.parentNode&&s.parentNode.removeChild(s); }
    window[cb] = function(d){ cleanup(); res(d); };
    s.onerror  = function(){ cleanup(); rej(new Error('Network error')); };
    s.src = url + '&callback=' + cb;
    document.head.appendChild(s);
  });
}
function gasPost(action, payload) {
  return gasGet(action, { payload: JSON.stringify(payload) });
}

// ── ROUTING ───────────────────────────────────────────────────
function go(id) {
  document.querySelectorAll('.screen').forEach(function(s){ s.classList.remove('active'); });
  document.getElementById(id).classList.add('active');
}

// ── INIT ──────────────────────────────────────────────────────
window.addEventListener('load', function() {
  tick();
  var m = window.location.search.match(/[?&]room=([^&]+)/);
  if (m) loadRoom(decodeURIComponent(m[1]));
  else go('s-home');
});

// ── CAMERA ───────────────────────────────────────────────────
function startScan() { go('s-scanning'); openCamera(); }

function openCamera() {
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    showToast('Camera not available'); go('s-home'); return;
  }
  navigator.mediaDevices.getUserMedia({ video: { facingMode: { ideal: facingMode }, width: { ideal: 1280 }, height: { ideal: 720 } } })
  .then(function(stream) {
    videoStream = stream;
    var video = document.getElementById('qr-video');
    video.srcObject = stream; video.play();
    var canvas = document.createElement('canvas');
    var ctx    = canvas.getContext('2d', { willReadFrequently: true });
    scanInterval = setInterval(function() {
      if (video.readyState !== video.HAVE_ENOUGH_DATA) return;
      canvas.width = video.videoWidth; canvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      var img  = ctx.getImageData(0, 0, canvas.width, canvas.height);
      var code = jsQR(img.data, img.width, img.height, { inversionAttempts: 'dontInvert' });
      if (code && code.data) { stopScan(); parseQR(code.data); }
    }, 200);
  })
  .catch(function(err) {
    stopScan();
    showToast(err.name === 'NotAllowedError' ? 'Camera permission denied' : 'Camera error: ' + err.message);
    go('s-home');
  });
}

function stopScan() {
  if (scanInterval) { clearInterval(scanInterval); scanInterval = null; }
  if (videoStream)  { videoStream.getTracks().forEach(function(t){ t.stop(); }); videoStream = null; }
  var v = document.getElementById('qr-video');
  if (v) v.srcObject = null;
  go('s-home');
}

function flipCamera() {
  facingMode = facingMode === 'environment' ? 'user' : 'environment';
  if (scanInterval) { clearInterval(scanInterval); scanInterval = null; }
  if (videoStream)  { videoStream.getTracks().forEach(function(t){ t.stop(); }); videoStream = null; }
  openCamera();
}

function parseQR(data) {
  var m = data.match(/[?&]room=([^&\s]+)/);
  loadRoom(m ? decodeURIComponent(m[1]) : data.trim());
}

// ── ROOM LOOKUP ───────────────────────────────────────────────
function loadRoom(roomId) {
  if (!roomId) { showToast('Invalid QR'); return; }
  go('s-detecting');
  document.getElementById('det-room').textContent = 'Room ' + roomId;
  document.getElementById('det-sub').textContent  = 'Looking up current period…';
  gasGet('getClassForRoom', { roomId: roomId })
    .then(function(r) {
      if (r.error)          { showToast(r.error); go('s-home'); return; }
      if (r.noCurrentClass) { showToast(r.reason || 'No class right now'); loadFallback(); return; }
      openAttendance(r);
    })
    .catch(function(e) { showToast('Error: ' + e.message); go('s-home'); });
}

// ── ATTENDANCE ────────────────────────────────────────────────
function openAttendance(cls) {
  currentClass = cls;
  attState     = {};
  document.getElementById('att-class').textContent = cls.className || cls.sectionName || '';
  document.getElementById('att-meta').textContent  =
    [cls.teacherName, cls.day, cls.period, cls.startTime ? cls.startTime+'–'+cls.endTime : ''].filter(Boolean).join(' · ');
  var pills = '';
  if (cls.roomName) pills += '<span class="pill pill-blue">' + cls.roomName + '</span>';
  if (cls.period)   pills += '<span class="pill pill-gray">' + cls.period + '</span>';
  pills += '<button class="not-your-class" onclick="loadFallback()">Not your class?</button>';
  document.getElementById('att-pills').innerHTML = pills;
  document.getElementById('att-error').classList.remove('show');
  // Warn if attendance was already taken via Veracross dashboard
  if (cls.classAlreadyTaken) {
    var e = document.getElementById('att-error');
    e.textContent = 'Attendance was already taken for this class in Veracross. Existing statuses are shown below.';
    e.classList.add('show');
  }
  renderStudents(cls.students || []);
  updateTally();
  go('s-attendance');
}

function statusLabel(code) {
  var labels = {
    0:'Present', 8:'Tardy', 9:'Tardy (Excused)', 29:'Absent', 30:'Absent (Excused)',
    32:'Not Expected', 33:'Leave of Absence', 50:'Early Dismissal',
    70:'Imperfect Attendance', 87:'Commute LE', 88:'Family Obligation',
    89:'Sick', 90:'Discretionary Day', 91:'GO', 92:'Mechaneches',
    94:'Guidance Counselor', 95:'Sick LE', 96:'GO LE', 97:'Mechaneches LE',
    98:'Medical Appt LE', 99:'Medical Appt', 100:'College Guidance LE',
    101:'Guidance LE', 102:'Mechaneches', 106:'Sick ED', 107:'Discretionary ED',
    108:'Medical Appt ED', 109:'Family Obligation LE', 110:'Family Obligation ED',
    112:'First Time LE', 113:'Discretionary LE', 114:'College Guidance',
  };
  return labels[code] || ('Status ' + code);
}

function renderStudents(students) {
  if (!students || !students.length) {
    document.getElementById('student-list').innerHTML =
      '<div style="padding:32px;text-align:center;color:#aaa">No students</div>';
    updateProgress(); return;
  }
  var html = '';
  students.forEach(function(s) {
    var locked  = !!s.officeMarked;
    var initSt  = locked
      ? (s.existingStatus === 8 ? 'tardy' : s.existingStatus === 29 ? 'absent' : 'present')
      : 'present';
    attState[s.id] = { status: initSt, note: s.existingNote || '', locked: locked };

    var rc = 'student-row' + (locked ? ' office-marked' : '');
    var badge = locked
      ? ' <span class="office-badge">Office: ' + statusLabel(s.existingStatus) + '</span>'
      : '';
    var dis = locked ? ' disabled' : '';
    var note = (s.existingNote || '').replace(/"/g, '&quot;');
    var noteOpen = (!locked && s.existingNote) ? ' open' : '';
    var pencilCls = s.existingNote ? ' has-note' : '';
    var pencilDis = locked ? ' disabled style="opacity:.35;cursor:default"' : '';

    // For locked students, highlight the actual office status
    var pOn = !locked && initSt==='present' ? ' on' : '';
    var tOn = initSt==='tardy'  ? ' on' : '';
    var aOn = initSt==='absent' ? ' on' : '';

    html +=
      '<div class="' + rc + '" id="row-' + s.id + '">' +
        '<div class="avatar">' + initials(s.name) + '</div>' +
        '<div class="student-name">' + s.name + badge + '</div>' +
        '<div class="status-btns">' +
          '<button class="sbtn sbtn-present' + pOn + '"' + dis + ' onclick="setStatus(\'' + s.id + '\',\'present\')">P</button>' +
          '<button class="sbtn sbtn-tardy'   + tOn + '"' + dis + ' onclick="setStatus(\'' + s.id + '\',\'tardy\')">T</button>'   +
          '<button class="sbtn sbtn-absent'  + aOn + '"' + dis + ' onclick="setStatus(\'' + s.id + '\',\'absent\')">A</button>'  +
        '</div>' +
        '<button class="pencil-btn' + pencilCls + '"' + pencilDis + ' onclick="toggleNote(\'' + s.id + '\')">✏️</button>' +
      '</div>' +
      '<div class="note-row' + noteOpen + '" id="note-row-' + s.id + '">' +
        '<input class="note-input" id="note-' + s.id + '" type="text" placeholder="Add a note…" value="' + note + '"' + (locked?' disabled':'') + ' oninput="saveNote(\'' + s.id + '\')">' +
      '</div>';
  });
  document.getElementById('student-list').innerHTML = html;
  updateProgress();
}

function toggleNote(id) {
  var row = document.getElementById('note-row-' + id);
  if (!row) return;
  var open = row.classList.toggle('open');
  if (open) { var inp = document.getElementById('note-' + id); if (inp) inp.focus(); }
}

function saveNote(id) {
  var inp = document.getElementById('note-' + id);
  var btn = document.querySelector('#row-' + id + ' .pencil-btn');
  if (inp && attState[id]) attState[id].note = inp.value;
  if (btn) btn.classList.toggle('has-note', !!(inp && inp.value.trim()));
}

function setStatus(id, status) {
  if (attState[id] && attState[id].locked) return;
  if (attState[id]) attState[id].status = status;
  else attState[id] = { status: status, note: '' };
  var row = document.getElementById('row-' + id);
  if (!row) return;
  row.querySelectorAll('.sbtn').forEach(function(b){ b.classList.remove('on'); });
  var btns = row.querySelectorAll('.sbtn');
  var idx = { present:0, tardy:1, absent:2 }[status];
  if (btns[idx]) btns[idx].classList.add('on');
  updateTally(); updateProgress();
}

function updateTally() {
  var p=0,t=0,a=0;
  Object.values(attState).forEach(function(s){
    if (s.locked) return; // don't count office-marked students
    var st = s.status || s;
    if(st==='present')p++; else if(st==='tardy')t++; else if(st==='absent')a++;
  });
  document.getElementById('t-present').textContent=p;
  document.getElementById('t-tardy').textContent=t;
  document.getElementById('t-absent').textContent=a;
}

function updateProgress() {
  // Only count students the teacher needs to mark (not office-marked)
  var unlocked = Object.values(attState).filter(function(s){ return !s.locked; });
  var total    = unlocked.length;
  var marked   = unlocked.filter(function(s){ return s.status; }).length;
  document.getElementById('prog-lbl').textContent = marked+'/'+total;
  document.getElementById('submit-btn').disabled  = marked < total;
}

function submitAttendance() {
  if (!currentClass) return;
  var btn = document.getElementById('submit-btn');
  btn.disabled = true; btn.textContent = 'Submitting…';
  var today = new Date();
  var dateStr = today.getFullYear()+'-'+String(today.getMonth()+1).padStart(2,'0')+'-'+String(today.getDate()).padStart(2,'0');
  var payload = {
    sectionId:   currentClass.sectionId,
    className:   currentClass.className || currentClass.sectionName || '',
    teacherName: currentClass.teacherName || '',
    roomName:    currentClass.roomName    || '',
    period:      currentClass.period      || '',
    date:        dateStr,
    records: Object.keys(attState)
      .filter(function(id){ return !attState[id].locked; })
      .map(function(id){ return { studentId:id, status:attState[id].status, note:attState[id].note||'' }; }),
  };
  gasPost('submitAttendance', payload)
    .then(function(r) {
      btn.disabled = false; btn.textContent = 'Submit attendance';
      if (r.success) {
        document.getElementById('success-sub').textContent = payload.records.length + ' students submitted for ' + payload.className;
        go('s-success');
      } else {
        var e = document.getElementById('att-error');
        e.textContent = r.error || 'Submission failed';
        e.classList.add('show');
        fixAttLayout();
      }
    })
    .catch(function(e) { btn.disabled=false; btn.textContent='Submit attendance'; showToast('Error: '+e.message); });
}

// ── FALLBACK PICKER ───────────────────────────────────────────
function loadFallback() {
  if (scheduleData) { go('s-fallback'); renderFallbackList(); return; }
  go('s-detecting');
  document.getElementById('det-sub').textContent = 'Loading schedule…';
  gasGet('getAllScheduleData')
    .then(function(data) { scheduleData = data; go('s-fallback'); renderFallbackList(); })
    .catch(function(e) { showToast('Could not load: ' + e.message); go('s-home'); });
}

function switchTab(tab) {
  fallbackTab = tab;
  ['teacher','room','block'].forEach(function(t){
    document.getElementById('seg-'+t).className = 'seg-btn ' + (t===tab?'on':'off');
  });
  renderFallbackList();
}

function toMins(t) {
  if (!t) return 999;
  var m = t.match(/(\d+):(\d+)\s*(AM|PM)/i);
  if (!m) return 999;
  var h=parseInt(m[1]), mn=parseInt(m[2]), pm=m[3].toUpperCase()==='PM';
  if(pm&&h!==12)h+=12; if(!pm&&h===12)h=0;
  return h*60+mn;
}

function renderFallbackList() {
  if (!scheduleData) return;
  var html = '';
  if (fallbackTab === 'teacher') {
    var map = scheduleData.teacherSchedule || {};
    Object.keys(map).sort(function(a,b){
      return ((map[a][0]||{}).teacherName||'').localeCompare((map[b][0]||{}).teacherName||'');
    }).forEach(function(tid){
      var cls=map[tid]; if(!cls||!cls.length) return;
      html += fbItem(initials(cls[0].teacherName||''),'',cls[0].teacherName||'?',
        cls.length+' class'+(cls.length>1?'es':''),'showTeacher(\''+tid+'\')');
    });
  } else if (fallbackTab === 'room') {
    var map = scheduleData.roomSchedule || {};
    // Sort numerically by room number, then named rooms (Gym, LS Classroom etc) after
    Object.keys(map).sort(function(a,b){
      var na = (map[a][0]||{}).roomName||'';
      var nb = (map[b][0]||{}).roomName||'';
      var ma = na.match(/(\d+)/);
      var mb = nb.match(/(\d+)/);
      // Both have numbers — sort numerically
      if (ma && mb) return parseInt(ma[1]) - parseInt(mb[1]);
      // Only a has number — a comes first
      if (ma) return -1;
      // Only b has number — b comes first
      if (mb) return 1;
      // Neither has number — sort alphabetically
      return na.localeCompare(nb);
    }).forEach(function(rid){
      var cls=map[rid]; if(!cls||!cls.length) return;
      var rn = cls[0].roomName || 'Room '+rid;
      // Show room number in icon, "classrooms" as subtitle
      var num = rn.match(/(\d+)/);
      var icon = num ? num[1] : rn.replace('Room ','');
      var detail = cls.length+' class'+(cls.length>1?'es':'')+' · classrooms';
      html += fbItem(icon,'room',rn,detail,'showRoom(\''+rid+'\')');
    });
  } else {
    var bm={}, rs=scheduleData.roomSchedule||{};
    Object.keys(rs).forEach(function(rid){
      rs[rid].forEach(function(c){
        var bk=c.period||'No Period';
        if(!bm[bk]) bm[bk]={classes:[],st:c.startTime,et:c.endTime,abbr:c.periodAbbr||bk};
        bm[bk].classes.push(c);
      });
    });
    function gradeNum(name) {
      if (!name) return 99;
      var m = name.match(/\((\d{1,2})\)/);
      return m ? parseInt(m[1]) : 99;
    }
    Object.keys(bm).sort(function(a,b){ return toMins(bm[a].st)-toMins(bm[b].st); })
    .forEach(function(bk){
      var bd=bm[bk];
      // Sort classes within period by grade (low→high) then name alphabetically
      bd.classes.sort(function(a,b){
        var ga=gradeNum(a.sectionName), gb=gradeNum(b.sectionName);
        if(ga!==gb) return ga-gb;
        return (a.sectionName||'').localeCompare(b.sectionName||'');
      });
      var detail=(bd.st?bd.st+'-'+bd.et+' · ':'')+bd.classes.length+' class'+(bd.classes.length>1?'es':'');
      html += fbItem(bd.abbr,'period',bk,detail,'showPeriod(\''+encodeURIComponent(bk)+'\')');
    });
  }
  if (!html) html='<div style="padding:32px;text-align:center;color:#aaa">No classes loaded</div>';
  document.getElementById('fb-list').innerHTML = html;
}

function fbItem(icon,iconClass,name,detail,onclick) {
  return '<div class="fb-item" onclick="'+onclick+'">' +
    '<div class="fb-icon '+iconClass+'">'+icon+'</div>' +
    '<div class="fb-main"><div class="fb-name">'+name+'</div><div class="fb-detail">'+detail+'</div></div>' +
    '<div class="fb-arrow">›</div></div>';
}

function showTeacher(tid) {
  var cls=((scheduleData||{}).teacherSchedule||{})[tid]||[];
  cls=cls.slice().sort(function(a,b){return toMins(a.startTime)-toMins(b.startTime);});
  var html=backRow(cls.length?cls[0].teacherName:'','teacher');
  cls.forEach(function(c){html+=classRow(c);});
  document.getElementById('fb-list').innerHTML=html;
}

function showRoom(rid) {
  var cls=((scheduleData||{}).roomSchedule||{})[rid]||[];
  cls=cls.slice().sort(function(a,b){return toMins(a.startTime)-toMins(b.startTime);});
  var html=backRow(cls.length?(cls[0].roomName||'Room '+rid):'','room');
  cls.forEach(function(c){html+=classRow(c);});
  document.getElementById('fb-list').innerHTML=html;
}

function showPeriod(enc) {
  var bk=decodeURIComponent(enc), rs=((scheduleData||{}).roomSchedule)||{}, cls=[];
  Object.keys(rs).forEach(function(rid){
    rs[rid].forEach(function(c){if((c.period||'No Period')===bk)cls.push(c);});
  });
  function gradeNum(name) {
    if (!name) return 99;
    var m = name.match(/\((\d{1,2})\)/);
    return m ? parseInt(m[1]) : 99;
  }
  cls.sort(function(a,b){
    var ga=gradeNum(a.sectionName), gb=gradeNum(b.sectionName);
    if(ga!==gb) return ga-gb;
    return (a.sectionName||'').localeCompare(b.sectionName||'');
  });
  var html=backRow(bk,'block');
  cls.forEach(function(c){html+=classRow(c);});
  document.getElementById('fb-list').innerHTML=html;
}

function classRow(cls) {
  var meta=[cls.teacherName,cls.period,cls.startTime?cls.startTime+'–'+cls.endTime:''].filter(Boolean).join(' · ');
  return '<div class="fb-item" onclick="loadBySection(\''+cls.sectionId+'\')">'+
    '<div class="fb-icon period">'+(cls.periodAbbr||cls.period||'—')+'</div>'+
    '<div class="fb-main"><div class="fb-name">'+(cls.sectionName||'')+'</div><div class="fb-detail">'+meta+'</div></div>'+
    '<div class="fb-arrow">›</div></div>';
}

function loadBySection(sectionId) {
  var cls=null, rs=((scheduleData||{}).roomSchedule)||{};
  Object.keys(rs).forEach(function(rid){ rs[rid].forEach(function(c){ if(c.sectionId===sectionId) cls=c; }); });
  if (!cls) { showToast('Class not found'); return; }
  go('s-detecting');
  document.getElementById('det-sub').textContent='Loading roster…';
  gasGet('getClassBySection',{sectionId:sectionId})
    .then(function(r){
      if(r.error){showToast(r.error);go('s-fallback');return;}
      cls.students = r.students;
      cls.classAlreadyTaken = r.classAlreadyTaken || false;
      openAttendance(cls);
    })
    .catch(function(){showToast('Could not load roster');go('s-fallback');});
}

function backRow(name,tab) {
  return '<div class="fb-back-row">'+
    '<button style="background:none;border:none;font-size:22px;color:#888;cursor:pointer" onclick="switchTab(\''+tab+'\')">←</button>'+
    '<span style="font-size:15px;font-weight:500">'+name+'</span></div>';
}

// ── UTILS ─────────────────────────────────────────────────────
function initials(n) {
  return (n||'').split(' ').map(function(w){return w[0];}).filter(function(c){return c&&/[A-Za-z]/.test(c);}).join('').slice(0,2).toUpperCase()||'?';
}
function showToast(msg) {
  var t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},3500);
}
function tick() {
  var now=new Date(),h=now.getHours(),m=now.getMinutes();
  var el=document.getElementById('clock');
  if(el) el.textContent=(h%12||12)+':'+(m<10?'0':'')+m+(h<12?' AM':' PM')+' · '+now.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
}
tick(); setInterval(tick,30000);
</script>
